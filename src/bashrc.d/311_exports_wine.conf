# WINE
## WINE DEFAULT
export WINEPFXS="${HOME}/.local/share/winepfxs"
export WINERUNNERS="${HOME}/.local/lib/winerunners"
export WINEARCH="win64"
export WINEDEBUG="-all"
export WINELOADER="${WINERUNNERS}/wine/lutris-6.10-7-x86_64/bin/wine"
export WINESERVER="${WINERUNNERS}/wine/lutris-6.10-7-x86_64/bin/wineserver"
export WINE_FONTCONFIG_PATH="${WINEPFXS}/.config/fonts"
export WINE_FONTCONFIG_FILE="${WINEPFXS}/.config/fonts/fonts.conf"
export WINEDLLOVERRIDES="winemenubuilder.exe=d"

## WINETRICKS NEEDS THIS TO BE SET WITH NO SYSTEM WINE INSTALLED
export WINE="${WINELOADERS}/lutris/runners/wine/lutris-6.10-7-x86_64/bin/wine"