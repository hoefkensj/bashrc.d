#
# Quick Aid
alias cpwd='xclip <<< $(pwd)'
alias rcedit='${EDITOR} /opt/local/config/rc/bashrc.d/'

# Content display
alias diff='diff --color=auto'
alias dir='dir --color=auto'
alias eza='eza --icons=always  -lAnogBhTL1'
alias ls='ls --color=auto'
alias vdir='vdir --color=auto'

# Searching
alias grep='grep -i'
alias locate='locate -i'
alias rg='rg -i'
alias unik='awk '!seen[$0]++''

# Networkin
alias lsop='seq 1 65535 | while read port; do echo $port 2>/dev/null >/dev/tcp/0.0.0.0/$port && echo $IPADDR:$port open; done'
alias lsop4='printf "IP/HOST to scan:" && read IPADDR && seq 1 65535 | while read port; do echo $port 2>/dev/null >/dev/tcp/$IPADDR/$port && echo $IPADDR:$port open; done'
alias myip4='curl -l4 ifconfig.co'
alias myip6='curl -l6 ifconfig.co'


# Device Display
alias lsdisk='lsblk -dI8,259 -o MODEL,NAME,SIZE,TRAN,ROTA,SERIAL,STATE,RM,HOTPLUG,PTTYPE'
alias lspart='lsblk -I8,259 -o PARTN,START,NAME,PARTTYPENAME,PARTLABEL,SIZE'
alias lspartvol='lsblk -I8,259 -o NAME,PARTLABEL,LABEL,START,SIZE,FSTYPE,FSSIZE,FSUSED,FSAVAIL,FSUSE%,MOUNTPOINTS'
alias lsvol='lsblk -I8,259 -o NAME,LABEL,FSTYPE,FSSIZE,FSUSED,FSUSE%,MOUNTPOINTS'

# File management
alias del='env rm -rv'
alias rm='trash'
alias undorm='trash-restore $_'
alias unexist='sudo env rm -rv'


