#!/usr/bin/env bash
function sync_ip4 () {

	local OUT IP4LOG PASS ROUTERURL

	function check_ip4(){
		local PREVIP THISIP
		PREVIP=$(cat ~/.ip4.history|tail -n1 2>$OUT)
		THISIP=$(myip4)
		[[ "$PREVIP" != "$THISIP" ]] && printf '%s\n' "$THISIP" >> $IP4LOG && return 0
		[[ "$PREVIP" == "$THISIP" ]] && return 1
	}
	function update_ip4(){
		curl -s -X POST -d "ip=$(myip4)" -d "auth=${PASS}" "${ROUTERURL}" && printf "IP \x1b[32mUpdated\x1b[m\n" || printf '\x1b[31mFailed\x1b[m\n'
	}


	local OUT IP4LOG PASS ROUTERURL
	
	function _main(){
		check_ip4 && update_ip4
	}
	
	OUT="/dev/null"
	IP4LOG="$HOME/.ip4.history"
	PASS="zonderpaswoordgaok"
	ROUTERURL="https://hoefkens.net/tools/router/lan.php"
	touch $IP4LOG
 	case "$1" in
                -d | --debug)
                        shift && set -o xtrace && ${FUNCNAME[0]} "$@"
                        ;;
		-1 | --stdout)
			OUT=1
			;;
		*)
                        _main "$@"
                        ;;
        esac;
}
